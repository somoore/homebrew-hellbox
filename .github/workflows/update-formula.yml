name: update-formula

# Keep Formula/hellbox.rb pinned to the latest somoore/hellbox release.
# Runs on a schedule (and on demand) so it needs no cross-repo token:
# GITHUB_TOKEN can push to this repo, and release discovery is public.

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-formula
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve latest hellbox release
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo somoore/hellbox --json tagName --jq .tagName)
          VERSION="${TAG#v}"
          CURRENT=$(sed -n 's/^  version "\(.*\)"/\1/p' Formula/hellbox.rb)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "up to date ($CURRENT)"; echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "update $CURRENT -> $VERSION"; echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download, attest, and hash release binaries
        if: steps.rel.outputs.changed == 'true'
        id: sums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          set -euo pipefail
          for asset in hellbox-macos-arm64 hellbox-macos-x86_64 hellbox-linux-arm64 hellbox-linux-x86_64; do
            curl -fsSL -o "$asset" \
              "https://github.com/somoore/hellbox/releases/download/${TAG}/${asset}"
            # SECURITY: the formula's sha256 pins whatever we hash here, so verify
            # build provenance FIRST — a swapped asset must fail loudly, not get pinned.
            gh attestation verify "$asset" --repo somoore/hellbox \
              --signer-workflow "github.com/somoore/hellbox/.github/workflows/release.yml" \
              --source-ref "refs/tags/${TAG}"
            echo "${asset}=$(sha256sum "$asset" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          done

      - name: Regenerate formula
        if: steps.rel.outputs.changed == 'true'
        env:
          TAG: ${{ steps.rel.outputs.tag }}
          VERSION: ${{ steps.rel.outputs.version }}
          SHA_MAC_ARM: ${{ steps.sums.outputs.hellbox-macos-arm64 }}
          SHA_MAC_X64: ${{ steps.sums.outputs.hellbox-macos-x86_64 }}
          SHA_LIN_ARM: ${{ steps.sums.outputs.hellbox-linux-arm64 }}
          SHA_LIN_X64: ${{ steps.sums.outputs.hellbox-linux-x86_64 }}
        run: |
          set -euo pipefail
          base="https://github.com/somoore/hellbox/releases/download/${TAG}"
          cat > Formula/hellbox.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # Autogenerated by .github/workflows/update-formula.yml — do not edit by hand.
          # SHA256s are pinned from the GitHub release assets after their build-provenance
          # attestations are verified against the hellbox release workflow.
          class Hellbox < Formula
            desc "Run native DOOM inside an AWS Lambda MicroVM, streamed to a browser tab"
            homepage "https://github.com/somoore/hellbox"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "${base}/hellbox-macos-arm64"
                sha256 "${SHA_MAC_ARM}"
              end
              on_intel do
                url "${base}/hellbox-macos-x86_64"
                sha256 "${SHA_MAC_X64}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/hellbox-linux-arm64"
                sha256 "${SHA_LIN_ARM}"
              end
              on_intel do
                url "${base}/hellbox-linux-x86_64"
                sha256 "${SHA_LIN_X64}"
              end
            end

            def install
              bin.install Dir["hellbox-*"].first => "hellbox"
            end

            def caveats
              <<~CAVEATS
                hellbox drives AWS resources and builds its MicroVM image from the
                Hellbox repo's capsule/ directory:
                  git clone https://github.com/somoore/hellbox
                  cd hellbox && ./deploy.sh   # uses this brew-installed binary
              CAVEATS
            end

            test do
              assert_match "hellbox", shell_output("#{bin}/hellbox --version")
            end
          end
          EOF

      - name: Commit and push
        if: steps.rel.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          git config user.name "hellbox-tap-bot"
          git config user.email "actions@github.com"
          git add Formula/hellbox.rb
          git commit -m "hellbox ${VERSION} (attestation-verified)"
          git push
